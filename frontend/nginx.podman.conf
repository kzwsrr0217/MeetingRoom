# Production nginx for the Podman / on-prem deployment.
# Processed as a template by the nginx image (envsubst) so ${NGINX_RESOLVER} is
# filled from the container's DNS at startup. Serves the built SPA and proxies
# /api to the backend using a *variable* proxy_pass, which forces per-request DNS
# re-resolution — so recreating the backend container (new IP) no longer 502s
# until nginx is restarted.
resolver ${NGINX_RESOLVER} valid=10s ipv6=off;

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    location ~* \.(js|css|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /api {
        set $upstream_backend http://backend:3000;
        proxy_pass $upstream_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
