version: '3.8'

services:
  backend:
    image: node:20-alpine
    container_name: meetingroom_backend
    working_dir: /app
    volumes:
      - ./backend:/app
      - /app/node_modules
      # Explicit bind-mount so rooms.json + config.json survive "docker compose down" and re-up
      - ./backend/data:/app/data
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run start:dev"
    environment:
      - NODE_ENV=development
      - USE_MOCK_DATA=true
      - PORT=3000
    healthcheck:
      # wget is available in alpine; -q suppresses output, -O- prints to stdout
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      # Long start_period covers npm install + NestJS compile on first run
      start_period: 120s

  frontend:
    image: node:20-alpine
    container_name: meetingroom_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      # Change to the server's LAN IP (e.g. http://192.168.1.10:3000)
      # when tablets on the local network need to reach the backend.
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - backend
