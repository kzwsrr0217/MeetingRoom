name: CI

on:
  push:
    branches: [master, main]
  pull_request:

# Cancel superseded runs on the same ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (tests + e2e)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Unit tests
        run: npm test
      - name: E2E tests
        run: npm run test:e2e -- --forceExit

  frontend:
    name: Frontend (build + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Type-check + build
        run: npm run build
      - name: Component tests
        run: npm test

  images:
    name: Container images build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      # Verify the production images build (GitHub runners aren't behind Zscaler,
      # so the plain Dockerfiles work — the *.corpca variants are for on-prem).
      - name: Build backend image
        run: docker build -t meetingroom-backend ./backend
      - name: Build frontend image
        run: docker build -f frontend/Dockerfile.podman -t meetingroom-frontend ./frontend
